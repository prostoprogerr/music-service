{% extends 'similarity/base.html' %}
{% block content %}
<h2>Найти похожие треки</h2>
<form method="post">
    {% csrf_token %}
    <input type="text" name="artist" placeholder="Исполнитель" required><br><br>
    <input type="text" name="title" placeholder="Название трека" required><br><br>
    <button type="submit">Найти</button>
</form>
{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}
{% endblock %}
